# Trend Micro Integration API - Docker Desktop (Mac/Windows)
# The image has its own pass store (no host mount). Populate it once with
# ./export-pass-for-docker.sh on a Mac/Linux with pass, then build.
# Start: docker compose up -d --build

services:
  api:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: monitoring-api:latest
    container_name: monitoring-api
    ports:
      - "8080:8080"   # static: data/jsonl_viewer.html and JSONL files
      - "8081:8081"   # API
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - USE_PASS=true
      - PASSWORD_STORE_DIR=/app/.password-store
      - GNUPGHOME=/app/.gnupg
    restart: unless-stopped
